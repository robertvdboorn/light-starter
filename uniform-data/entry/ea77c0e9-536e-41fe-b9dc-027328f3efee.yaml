  _name: What is Uniform Canvas?
  _slug: what-is-uniform-canvas
  type: faq
  fields:
    question:
      type: text
      locales:
        en-US: What is Uniform Canvas?
    answer:
      type: text
      locales:
        en-US: >-
          Uniform Canvas is the visual editing environment where content authors
          compose pages from registered React components. Authors drag components
          into slots, edit text inline, and publish without deploys for most
          content updates. This starter maps every URL through
          `src/pages/[[...slug]].tsx`, which fetches the matching composition
          from Uniform at request time.
  _locales:
    - en-US
