  _name: What is a UniformSlot and how does it work?
  _slug: what-is-a-uniform-slot
  type: faq
  fields:
    question:
      type: text
      locales:
        en-US: What is a UniformSlot and how does it work?
    answer:
      type: text
      locales:
        en-US: >-
          A UniformSlot is a named area inside a component where content authors
          can drop child components in Canvas. In code you render
          `<UniformSlot name="slotName" />` and in the component YAML you
          declare the slot with an `allowedComponents` list. Authors see the
          slot as a droppable area in the visual editor and can add, reorder, or
          remove components without touching code.
  _locales:
    - en-US
