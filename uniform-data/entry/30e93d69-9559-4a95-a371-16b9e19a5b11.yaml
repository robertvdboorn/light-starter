  _name: What is a $loop and when do I use it?
  _slug: what-is-a-loop-and-when-do-i-use-it
  type: faq
  fields:
    question:
      type: text
      locales:
        en-US: What is a $loop and when do I use it?
    answer:
      type: text
      locales:
        en-US: >-
          A $loop is a special Uniform component that iterates over a data
          resource and renders a child component once per item. Connect it to a
          data type via the pattern's _dataResources, then bind child parameters
          to entry fields using JSON pointer expressions — for example pointing
          at /My Query/entries Loop Item/entry/fields/title/value. Use it any
          time you want a slot populated dynamically from content entries rather
          than manually placed components.
  _locales:
    - en-US
  _overridability:
    hideLockedParameters: true
