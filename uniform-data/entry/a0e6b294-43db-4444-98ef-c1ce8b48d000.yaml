  fields:
    question:
      type: text
      locales:
        en-US: How do I run this project locally?
    answer:
      type: text
      locales:
        en-US: >-
          Copy `.env.example` to `.env`, add your Uniform credentials, run
          `npm install`, then `npm run dev`. Open http://localhost:3000. Before
          editing in Canvas, push local definitions and content with
          `npx uniform sync push` (configured via `uniform.config.ts` in the
          project root).
  _locales:
    - en-US
