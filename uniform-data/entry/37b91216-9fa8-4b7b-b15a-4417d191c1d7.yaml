  _name: How do I change the brand colors?
  _slug: how-do-i-change-the-brand-colors
  type: faq
  fields:
    question:
      type: text
      locales:
        en-US: How do I change the brand colors?
    answer:
      type: text
      locales:
        en-US: >-
          Edit the three CSS variables in `src/styles/globals.css` under the
          "CUSTOMIZABLE BRAND COLORS" section: `--accent-hue` (0–360),
          `--accent-saturation`, and `--accent-lightness`. The primary blue
          button color is controlled separately by `--ui-primary`. All
          components consume these variables via Tailwind's theme tokens, so a
          single change propagates across the entire site.
  _locales:
    - en-US
