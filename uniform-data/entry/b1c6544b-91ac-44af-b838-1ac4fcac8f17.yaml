  _name: What environment variables do I need?
  _slug: what-environment-variables-do-i-need
  type: faq
  fields:
    question:
      type: text
      locales:
        en-US: What environment variables do I need?
    answer:
      type: text
      locales:
        en-US: >-
          UNIFORM_API_KEY and UNIFORM_PROJECT_ID connect the app to your Uniform
          project. UNIFORM_PREVIEW_SECRET secures the `/api/preview` route so
          authors can preview draft compositions from Canvas. Copy
          `.env.example` to `.env` and fill in values from your Uniform project
          settings.
  _locales:
    - en-US
